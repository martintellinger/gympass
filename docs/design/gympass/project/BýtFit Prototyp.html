<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BýtFit Klub · Prototyp</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #0B0B0C; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; color: #F5F5F7; }
  * { box-sizing: border-box; }

  .bg-grid {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(255,77,46,0.06), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(90,200,250,0.04), transparent 50%);
  }

  /* Hotspots */
  .hs { position: absolute; border-radius: 12px; cursor: pointer; z-index: 50; }
  .hs:hover { background: rgba(255,77,46,0.10); outline: 1.5px solid rgba(255,77,46,0.55); outline-offset: -1px; }
  .hs.show {
    background: rgba(255,77,46,0.14);
    outline: 1.5px dashed rgba(255,255,255,0.4); outline-offset: -1px;
    animation: pulse 1.8s ease-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,77,46,0.45); }
    70%  { box-shadow: 0 0 0 10px rgba(255,77,46,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,77,46,0); }
  }
  .hs-tap {
    position: absolute; inset: 0; border-radius: inherit;
    background: rgba(255,77,46,0.45); opacity: 0; pointer-events: none;
  }
  .hs.tapping .hs-tap { animation: tap 360ms ease-out; }
  @keyframes tap {
    0% { opacity: 0.9; transform: scale(0.6); }
    100% { opacity: 0; transform: scale(1.6); }
  }

  /* Screen transitions */
  .screen-enter { animation: screen-in 280ms ease-out both; }
  @keyframes screen-in {
    from { opacity: 0; transform: translateY(8px) scale(0.995); }
    to   { opacity: 1; transform: none; }
  }

  /* Toolbar buttons */
  .tb-btn { cursor: pointer; user-select: none; transition: background 120ms ease, color 120ms ease; }
  .tb-btn:hover { background: #1A1A1C; }
  .tb-btn.active { background: #1A1A1C; color: #fff; }
  .seg { cursor: pointer; user-select: none; }
  .seg:hover:not(.on) { color: #F5F5F7; }

  /* Flow map */
  .flow-row { cursor: pointer; user-select: none; transition: background 120ms ease; }
  .flow-row:hover { background: rgba(255,255,255,0.04); }
  .flow-row.current { background: rgba(255,77,46,0.08); }

  /* Hotspot legend label that floats next to hotspot when hints on */
  .hs-label {
    position: absolute; pointer-events: none;
    background: #FF4D2E; color: #fff;
    font-size: 10px; font-weight: 600; letter-spacing: 0.2px;
    padding: 3px 7px; border-radius: 5px;
    white-space: nowrap;
    transform: translateY(-100%) translateY(-6px);
    opacity: 0; transition: opacity 180ms ease;
  }
  .hs.show .hs-label { opacity: 1; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="screens/shared.jsx"></script>
<script type="text/babel" src="screens/MemberDashboard.jsx"></script>
<script type="text/babel" src="screens/QRPayment.jsx"></script>
<script type="text/babel" src="screens/MemberCard.jsx"></script>
<script type="text/babel" src="screens/AdminDashboard.jsx"></script>
<script type="text/babel" src="screens/MemberList.jsx"></script>
<script type="text/babel" src="screens/MemberDetail.jsx"></script>
<script type="text/babel" src="screens/ApprovalQueue.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef } = React;

// ── Screens registry ─────────────────────────────────────────
const SCREENS = {
  dashboard: { title: 'Dashboard',        sub: '04 · Pohled člena',     Comp: MemberDashboard, side: 'member' },
  qr:        { title: 'Prodloužení',      sub: '05 · QR platba',         Comp: QRPayment,       side: 'member' },
  card:      { title: 'Členská karta',    sub: '09 · Karta na full',     Comp: MemberCard,      side: 'member' },
  admin:     { title: 'Přehled',          sub: '10 · Pohled majitele',   Comp: AdminDashboard,  side: 'admin'  },
  list:      { title: 'Členové',          sub: '11 · Seznam',            Comp: MemberList,      side: 'admin'  },
  detail:    { title: 'Detail člena',     sub: '12 · Pavel Novák',       Comp: MemberDetail,    side: 'admin'  },
  approval:  { title: 'Schvalování',      sub: '13 · Jana K. (Student)', Comp: ApprovalQueue,   side: 'admin'  },
};

// Hotspots are positioned ON THE PHONE INNER (relative to its 0,0 = top-left of bezel inner).
// Each: { top|bottom, left|right, width, height, to, label }
const HOTSPOTS = {
  dashboard: [
    { top: 270,    left: 24,  width: 312, height: 52, to: 'qr',        label: 'Prodloužit členství' },
    { top: 376,    left: 24,  width: 312, height: 100, to: 'card',     label: 'Otevřít kartu' },
    { bottom: 14,  left: 76,  width: 68,  height: 56, to: 'card',      label: 'Karta' },
    { top: 58,     left: 300, width: 36,  height: 36, to: 'dashboard', label: 'Oznámení (—)' },
  ],
  qr: [
    { top: 58,    left: 16,  width: 36,  height: 36, to: 'dashboard', label: 'Zpět' },
  ],
  card: [
    { top: 60,    right: 20, width: 32,  height: 32, to: 'dashboard', label: 'Zavřít' },
  ],
  admin: [
    { top: 332,   left: 24,  width: 312, height: 64, to: 'approval', label: 'Čekající registrace' },
    { bottom: 14, left: 76,  width: 68,  height: 56, to: 'list',     label: 'Členové' },
    { top: 58,    right: 24, width: 36,  height: 36, to: 'admin',    label: 'Oznámení (—)' },
  ],
  list: [
    { top: 877,   left: 20,  width: 320, height: 70, to: 'detail',  label: 'Pavel Novák' },
    { top: 451,   left: 20,  width: 320, height: 70, to: 'detail',  label: 'David Janků (po lhůtě)' },
    { bottom: 14, left: 8,   width: 68,  height: 56, to: 'admin',   label: 'Přehled' },
    { top: 58,    right: 68, width: 40,  height: 40, to: 'list',    label: 'Filtr (—)' },
    { top: 58,    right: 20, width: 40,  height: 40, to: 'approval',label: 'Přidat člena → schvalování' },
  ],
  detail: [
    { top: 58,    left: 16,  width: 36,  height: 36, to: 'list',   label: 'Zpět' },
    { top: 58,    right: 16, width: 36,  height: 36, to: 'detail', label: 'Upravit (—)' },
  ],
  approval: [
    { top: 58,    left: 16,  width: 36,  height: 36, to: 'admin',  label: 'Zpět' },
    { bottom: 32, left: 20,  width: 119, height: 52, to: 'admin',  label: 'Zamítnout' },
    { bottom: 32, left: 149, width: 191, height: 52, to: 'admin',  label: 'Schválit ✓' },
  ],
};

// Default starting screen for each side
const SIDE_START = { member: 'dashboard', admin: 'admin' };
const MEMBER_SCREENS = ['dashboard', 'qr', 'card'];
const ADMIN_SCREENS  = ['admin', 'list', 'detail', 'approval'];

// ── Phone bezel ──────────────────────────────────────────────
function Phone({ children, screenKey }) {
  return (
    <div style={{
      width: 376, alignSelf: 'flex-start',
      borderRadius: 48, position: 'relative',
      background: '#0F0F10', padding: 8,
      boxShadow: '0 40px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04)',
    }}>
      <div style={{
        borderRadius: 40, overflow: 'hidden',
        background: '#0F0F10', position: 'relative',
        outline: '1px solid #1A1A1C',
      }}>
        {/* Dynamic island */}
        <div style={{
          position: 'absolute', top: 10, left: '50%', transform: 'translateX(-50%)',
          width: 110, height: 30, borderRadius: 20, background: '#000', zIndex: 100,
        }}/>
        <div key={screenKey} className="screen-enter">
          {children}
        </div>
      </div>
    </div>
  );
}

// ── Hotspot layer ────────────────────────────────────────────
function HotspotLayer({ hotspots, onNav, show }) {
  const [tappingIdx, setTappingIdx] = useState(null);
  return (
    <>
      {hotspots.map((h, i) => {
        const style = { width: h.width, height: h.height };
        if (h.top != null) style.top = h.top;
        if (h.bottom != null) style.bottom = h.bottom;
        if (h.left != null) style.left = h.left;
        if (h.right != null) style.right = h.right;
        return (
          <div
            key={i}
            className={'hs' + (show ? ' show' : '') + (tappingIdx === i ? ' tapping' : '')}
            style={style}
            title={h.label}
            onClick={() => {
              setTappingIdx(i);
              setTimeout(() => {
                setTappingIdx(null);
                onNav(h.to);
              }, 180);
            }}
          >
            <div className="hs-tap"/>
            <span className="hs-label" style={{ top: 0, left: 0 }}>{h.label}</span>
          </div>
        );
      })}
    </>
  );
}

// ── Toolbar (top) ─────────────────────────────────────────────
function Toolbar({ screen, side, canBack, onBack, onJump, showHints, setShowHints }) {
  const cur = SCREENS[screen];
  return (
    <div style={{
      position: 'sticky', top: 0, zIndex: 200,
      background: 'rgba(11,11,12,0.85)', backdropFilter: 'blur(20px)',
      borderBottom: '1px solid #1A1A1C',
      padding: '14px 24px',
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      gap: 24,
    }}>
      {/* Left: brand + back */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{
            width: 28, height: 28, borderRadius: 8,
            background: '#FF4D2E', display: 'flex',
            alignItems: 'center', justifyContent: 'center',
            color: '#fff', fontSize: 14, fontWeight: 700, letterSpacing: -0.3,
          }}>B</div>
          <div>
            <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: 0.4, textTransform: 'uppercase' }}>BýtFit Klub</div>
            <div style={{ fontSize: 10.5, color: '#8e8e93', marginTop: 1, fontFamily: "'JetBrains Mono', monospace", letterSpacing: 0.4 }}>Klikatelný prototyp · v1</div>
          </div>
        </div>

        <div style={{ width: 1, height: 26, background: '#1A1A1C' }}/>

        <div
          className="tb-btn"
          onClick={canBack ? onBack : undefined}
          style={{
            display: 'inline-flex', alignItems: 'center', gap: 6,
            padding: '8px 12px', borderRadius: 9,
            background: '#141416', color: canBack ? '#F5F5F7' : '#5E5E63',
            border: '1px solid #1A1A1C', fontSize: 13, fontWeight: 500,
            opacity: canBack ? 1 : 0.5, cursor: canBack ? 'pointer' : 'default',
          }}
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          Zpět
          <span style={{ fontSize: 10, color: '#5E5E63', fontFamily: "'JetBrains Mono', monospace", marginLeft: 2 }}>ESC</span>
        </div>
      </div>

      {/* Center: current screen */}
      <div style={{ textAlign: 'center', flex: 1 }}>
        <div style={{ fontSize: 13.5, fontWeight: 600, letterSpacing: -0.2 }}>{cur.title}</div>
        <div style={{ fontSize: 11, color: '#8e8e93', marginTop: 2, fontFamily: "'JetBrains Mono', monospace" }}>{cur.sub}</div>
      </div>

      {/* Right: side switcher + hints */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <div style={{
          display: 'inline-flex', padding: 3, borderRadius: 10,
          background: '#141416', border: '1px solid #1A1A1C',
        }}>
          {[
            { key: 'member', label: 'Člen' },
            { key: 'admin',  label: 'Majitel' },
          ].map(s => (
            <div key={s.key}
              className={'seg' + (side === s.key ? ' on' : '')}
              onClick={() => onJump(SIDE_START[s.key])}
              style={{
                padding: '7px 14px', borderRadius: 7,
                fontSize: 12.5, fontWeight: 600, letterSpacing: -0.1,
                background: side === s.key ? '#FF4D2E' : 'transparent',
                color: side === s.key ? '#fff' : '#8e8e93',
                transition: 'background 120ms ease, color 120ms ease',
              }}>{s.label}</div>
          ))}
        </div>

        <div
          className="tb-btn"
          onClick={() => setShowHints(v => !v)}
          style={{
            display: 'inline-flex', alignItems: 'center', gap: 6,
            padding: '8px 12px', borderRadius: 9,
            background: showHints ? '#FF4D2E' : '#141416',
            color: showHints ? '#fff' : '#F5F5F7',
            border: showHints ? '1px solid #FF4D2E' : '1px solid #1A1A1C',
            fontSize: 13, fontWeight: 500,
          }}
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>
          Hotspoty
          <span style={{ fontSize: 10, color: showHints ? 'rgba(255,255,255,0.7)' : '#5E5E63', fontFamily: "'JetBrains Mono', monospace", marginLeft: 2 }}>H</span>
        </div>
      </div>
    </div>
  );
}

// ── Flow map (right rail) ────────────────────────────────────
function FlowMap({ screen, side, onJump }) {
  const screens = side === 'member' ? MEMBER_SCREENS : ADMIN_SCREENS;
  return (
    <div style={{
      width: 240, padding: 18,
      background: '#0F0F10', border: '1px solid #1A1A1C',
      borderRadius: 14, alignSelf: 'flex-start',
      position: 'sticky', top: 100,
    }}>
      <div style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: 1.5, color: '#8e8e93', textTransform: 'uppercase' }}>
        Flow · {side === 'member' ? 'Člen' : 'Majitel'}
      </div>
      <div style={{ marginTop: 12, display: 'flex', flexDirection: 'column', gap: 2 }}>
        {screens.map((k, i) => {
          const s = SCREENS[k];
          const isCurrent = k === screen;
          return (
            <div key={k}
              className={'flow-row' + (isCurrent ? ' current' : '')}
              onClick={() => onJump(k)}
              style={{
                padding: '10px 10px', borderRadius: 9,
                display: 'flex', alignItems: 'center', gap: 10,
              }}>
              <div style={{
                width: 22, height: 22, borderRadius: 6,
                background: isCurrent ? '#FF4D2E' : '#1A1A1C',
                color: isCurrent ? '#fff' : '#8e8e93',
                fontSize: 11, fontWeight: 700,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontFamily: "'JetBrains Mono', monospace",
              }}>{i+1}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 600, letterSpacing: -0.2, color: isCurrent ? '#F5F5F7' : '#C7C7CC' }}>{s.title}</div>
                <div style={{ fontSize: 10.5, color: '#5E5E63', fontFamily: "'JetBrains Mono', monospace", marginTop: 1 }}>{s.sub}</div>
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ marginTop: 16, paddingTop: 16, borderTop: '1px solid #1A1A1C' }}>
        <div style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: 1.5, color: '#8e8e93', textTransform: 'uppercase' }}>Klávesy</div>
        <div style={{ marginTop: 10, display: 'flex', flexDirection: 'column', gap: 6, fontSize: 12, color: '#8e8e93' }}>
          <KbdRow k="H">přepnout hotspoty</KbdRow>
          <KbdRow k="ESC">zpět</KbdRow>
          <KbdRow k="←  →">předchozí / další</KbdRow>
        </div>
      </div>
    </div>
  );
}

function KbdRow({ k, children }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
      <span style={{
        fontFamily: "'JetBrains Mono', monospace",
        fontSize: 10.5, color: '#F5F5F7',
        background: '#1A1A1C', border: '1px solid #2A2A2D',
        padding: '2px 7px', borderRadius: 5, minWidth: 36, textAlign: 'center',
      }}>{k}</span>
      <span>{children}</span>
    </div>
  );
}

// ── Side intro card (under phone) ────────────────────────────
function ScreenFooter({ screen }) {
  const hots = HOTSPOTS[screen] || [];
  return (
    <div style={{ marginTop: 16, width: 376, fontSize: 11.5, color: '#5E5E63', textAlign: 'center', lineHeight: 1.6, fontFamily: "'JetBrains Mono', monospace" }}>
      {hots.length} klikatelných oblastí · stiskni <b style={{ color: '#F5F5F7' }}>H</b> pro zvýraznění
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('dashboard');
  const [history, setHistory] = useState([]);
  const [showHints, setShowHints] = useState(true);
  const tickRef = useRef(0);

  // Persist between reloads
  useEffect(() => {
    try {
      const s = localStorage.getItem('bf-proto-screen');
      const h = JSON.parse(localStorage.getItem('bf-proto-history') || '[]');
      if (s && SCREENS[s]) setScreen(s);
      if (Array.isArray(h)) setHistory(h);
    } catch {}
  }, []);
  useEffect(() => {
    try {
      localStorage.setItem('bf-proto-screen', screen);
      localStorage.setItem('bf-proto-history', JSON.stringify(history));
    } catch {}
  }, [screen, history]);

  const navigate = (to) => {
    if (!SCREENS[to]) return;
    if (to === screen) return;
    setHistory(h => [...h, screen]);
    setScreen(to);
    tickRef.current += 1;
  };

  const goBack = () => {
    setHistory(h => {
      if (h.length === 0) return h;
      const last = h[h.length - 1];
      setScreen(last);
      tickRef.current += 1;
      return h.slice(0, -1);
    });
  };

  const jumpDirect = (to) => {
    if (!SCREENS[to]) return;
    if (to === screen) return;
    setHistory(h => [...h, screen]);
    setScreen(to);
    tickRef.current += 1;
  };

  // Keyboard
  useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.key === 'h' || e.key === 'H') { setShowHints(v => !v); e.preventDefault(); }
      else if (e.key === 'Escape' || e.key === 'Backspace') { goBack(); e.preventDefault(); }
      else if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        const sideScreens = SCREENS[screen].side === 'member' ? MEMBER_SCREENS : ADMIN_SCREENS;
        const idx = sideScreens.indexOf(screen);
        const next = e.key === 'ArrowLeft'
          ? sideScreens[Math.max(0, idx - 1)]
          : sideScreens[Math.min(sideScreens.length - 1, idx + 1)];
        if (next && next !== screen) jumpDirect(next);
        e.preventDefault();
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [screen, history]);

  const cur = SCREENS[screen];
  const Comp = cur.Comp;

  return (
    <div style={{ position: 'relative', zIndex: 1, minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      <Toolbar
        screen={screen}
        side={cur.side}
        canBack={history.length > 0}
        onBack={goBack}
        onJump={jumpDirect}
        showHints={showHints}
        setShowHints={setShowHints}
      />

      <div style={{
        flex: 1,
        display: 'flex', justifyContent: 'center',
        gap: 40, padding: '40px 40px 80px',
      }}>
        {/* Phone column */}
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
          <div style={{ position: 'relative' }}>
            <Phone screenKey={`${screen}-${tickRef.current}`}>
              <Comp/>
              <HotspotLayer
                hotspots={HOTSPOTS[screen] || []}
                onNav={navigate}
                show={showHints}
              />
            </Phone>
          </div>
          <ScreenFooter screen={screen}/>
        </div>

        {/* Flow map */}
        <FlowMap screen={screen} side={cur.side} onJump={jumpDirect}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
